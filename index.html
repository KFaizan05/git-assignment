<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chef - Faizan Kalam</title>
  
  <link rel="stylesheet" href="./vars.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./app.css">
  
  <style>
   * { box-sizing: border-box; margin: 0; padding: 0; border: none; text-decoration: none; background: none; -webkit-font-smoothing: antialiased; }
   
   .ai-chatbot-faizan {
       display: flex;
       flex-direction: column;
       height: 777.6px;
       width: 480px;
       margin: 0 auto;
       overflow: hidden;
       background: #FFFFFF;
       position: relative;
   }

   .app-screen { 
       display: flex; 
       flex-direction: column;
       flex: 1; 
       width: 100%; 
       overflow: hidden;
   }
   
   .app-chat-scroll { 
       overflow-y: auto; 
       flex: 1; 
       padding: 24px;
       display: flex;
       flex-direction: column;
       gap: 16px;
   }
  </style>
</head>
<body>
  <div class="ai-chatbot-faizan">
    
    <div class="app-screen" id="screen-chef">
      <div class="chatbot-recipe-screen" style="display: flex; flex-direction: column; height: 100%;">
        
        <div class="container">
          <div class="header-top-row">
            <div class="button"><img class="icon" src="icon0.svg" alt="Back" /></div>
            
            <div class="language-dropdown" id="lang-menu-container">
              <button type="button" class="language-switch" id="lang-toggle">
                <span>Language</span>
              </button>
              <ul class="dropdown-content" id="lang-options">
                <li data-lang="en">English</li>
                <li data-lang="es">Spanish</li>
                <li data-lang="fr">French</li>
              </ul>
            </div>
          </div>

          <div class="header-content">
            <div class="chef-circle"><img class="icon2" src="icon1.svg" alt="Chef" /></div>
            <div class="ai-chef-recipe">AI Chef Recipe</div>
          </div>
        </div>

        <div class="app-chat-scroll" id="messages-root"></div>

        <div class="container22">
          <div class="container24">
            <label class="upload-btn" for="chef-file-upload">
              <img src="icon0.svg" class="icon-upload" alt="Upload" />
              <input type="file" id="chef-file-upload" style="display: none;" accept="image/*" />
            </label>
            <div class="text-input" style="flex: 1;"><textarea id="chef-input" rows="1" placeholder="Type here..."></textarea></div>
            <button type="button" class="button3" id="chef-send"><div class="div2">→</div></button>
          </div>
        </div>
      </div>
    </div>

    <div class="navigation">
      <div class="link nav-item">
        <img class="icon8" src="icon7.svg" alt="Home" />
        <div class="home">Home</div>
      </div>
      <div class="link nav-item">
        <img class="icon9" src="icon8.svg" alt="Scan" />
        <div class="scan">Scan</div>
      </div>
      <div class="link nav-item is-active">
        <img class="icon10" src="icon9.svg" alt="AI Chat" />
        <div class="ai-chef">AI Chat</div>
      </div>
      <div class="link nav-item">
        <img class="icon11" src="icon10.svg" alt="History" />
        <div class="history">History</div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
