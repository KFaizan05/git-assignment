<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Safe Items</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/safeitems.css" />
</head>
<body>
  <main class="safeitems-page">
    <section class="safeitems-shell">

      <header class="safeitems-header">
        <button class="back-btn" id="backBtn" type="button" aria-label="Back">←</button>
        <div class="header-row">
          <div class="header-icon">✓</div>
          <div class="header-text">
            <h1>My Safe Items</h1>
            <p>Products approved for you</p>
          </div>
        </div>
      </header>

      <section class="safeitems-search">
        <input type="text" id="searchInput" class="search-input" placeholder="Search safe items..." />
      </section>

      <section class="safeitems-stats">
        <div class="stat">
          <strong id="statTotal">0</strong>
          <span>Total Safe</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <strong id="statFavorites">0</strong>
          <span>Favorites</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <strong id="statCategories">0</strong>
          <span>Categories</span>
        </div>
      </section>

      <section class="safeitems-content">
        <h2 class="section-label">All Safe Products</h2>
        <div id="safeList" class="safe-list"></div>

        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">✓</div>
          <h3>No safe items yet</h3>
          <p>Scan a product — anything that comes back safe will show up here automatically.</p>
          <a href="ScanPage.html" class="primary-action">Scan a Product</a>
        </div>
      </section>

      <footer class="safeitems-footer">
        <a href="ScanPage.html" class="primary-action">Scan New Product</a>
      </footer>

      <nav class="bottom-nav">
        <a href="DashboardPage.html" class="nav-item active">
          <div class="nav-icon">
            <img src="./images/WHomeIcon.png" class="nav-icon" alt="Home"/>
          </div>
          <span>Home</span>
        </a>

        <a href="ScanPage.html" class="nav-item nav-scan">
          <div class="scan-fab">
            <img src="./images/ScanIcon.png" class="nav-icon" alt="Scan"/>
          </div>
          <span>Scan</span>
        </a>

        <a href="AIChatbotPage.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/ChatIcon.png" class="nav-icon" alt="AI Chef"/>
          </div>
          <span>AI Chef</span>
        </a>

        <a href="ScanHistoryPage.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/GRecentIcon.png" class="nav-icon" alt="History"/>
          </div>
          <span>History</span>
        </a>
      </nav>

    </section>
  </main>

  <script src="../js/profileStorage.js"></script>
  <script src="../js/safeitems.js"></script>
</body>
</html>
