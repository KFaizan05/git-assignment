<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan History</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/scanhistory.css" />
</head>
<body>
  <main class="scanhistory-page">
    <section class="scanhistory-shell">

      <header class="scanhistory-header">
        <h1>Scan History</h1>
        <p>Your previously scanned products</p>
      </header>

      <section class="scanhistory-search">
        <input type="text" id="searchInput" class="search-input" placeholder="Search history..." />
      </section>

      <section class="scanhistory-stats">
        <div class="stat safe" data-filter="safe" role="button" tabindex="0" aria-pressed="false" aria-label="Filter by Safe scans">
          <strong id="statSafe">0</strong>
          <span>Safe</span>
        </div>
        <div class="stat unsafe" data-filter="unsafe" role="button" tabindex="0" aria-pressed="false" aria-label="Filter by Unsafe scans">
          <strong id="statUnsafe">0</strong>
          <span>Unsafe</span>
        </div>
        <div class="stat caution" data-filter="caution" role="button" tabindex="0" aria-pressed="false" aria-label="Filter by Caution scans">
          <strong id="statCaution">0</strong>
          <span>Caution</span>
        </div>
      </section>

      <section class="scanhistory-content">
        <div id="historyList" class="history-list"></div>

        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">⏱</div>
          <h3>No scans yet</h3>
          <p>Every product you scan will appear here. Give it a try — scan your first label.</p>
          <a href="ScanPage.html" class="primary-action">Scan a Product</a>
        </div>
      </section>

      <div class="compare-bar" id="compareBar" hidden>
        <button class="compare-btn" id="compareBtn" type="button">
          Compare Scans
        </button>
      </div>

      <nav class="bottom-nav">
        <a href="DashboardPage.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/WHomeIcon.png" class="nav-icon" alt="Home"/>
          </div>
          <span>Home</span>
        </a>

        <a href="ScanPage.html" class="nav-item nav-scan">
          <div class="scan-fab">
            <img src="./images/SmallScanIcon.png" class="nav-icon" alt="Scan"/>
          </div>
          <span>Scan</span>
        </a>

        <a href="AIChatbotPage.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/ChatIcon.png" class="nav-icon" alt="AI Chef"/>
          </div>
          <span>AI Chef</span>
        </a>

        <a href="ScanHistoryPage.html" class="nav-item active">
          <div class="nav-icon">
            <img src="./images/GRecentIcon.png" class="nav-icon" alt="History"/>
          </div>
          <span>History</span>
        </a>
      </nav>

    </section>
  </main>

  <div class="compare-modal" id="compareModal" hidden role="dialog" aria-modal="true" aria-labelledby="compareModalTitle">
    <div class="compare-modal-backdrop" id="compareModalBackdrop"></div>
    <div class="compare-modal-card">
      <div class="compare-modal-header">
        <h2 id="compareModalTitle">Ingredient Comparison</h2>
        <button class="compare-close-btn" id="compareCloseBtn" type="button" aria-label="Close comparison">✕</button>
      </div>

      <div class="compare-modal-section">
        <h3>Same Ingredients</h3>
        <div id="sameIngredientsBox" class="compare-list-box"></div>
      </div>

      <div class="compare-modal-section">
        <h3>Different Ingredients</h3>
        <div id="differentIngredientsBox" class="compare-list-box"></div>
      </div>
    </div>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/profileStorage.js"></script>
  <script src="../js/scanhistory.js"></script>
</body>
</html>
