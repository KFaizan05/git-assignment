<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/logs.css">
</head>
<body class="login-page">
  <div class="container">
    <img src="images/LabelWise.png" class="logo">
    <div class="card">
      <h2>Welcome Back!</h2>

      <form id="loginForm" novalidate>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter your email" autocomplete="username">

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">

        <p id="loginError" class="login-error" role="alert" hidden></p>

        <a href="#" class="forgot">Forgot password?</a>

        <button type="submit" class="primary-btn">Login</button>
      </form>

      <div class="divider"><span>or</span></div>

      <button id="googleLoginBtn" type="button" class="secondary google-login-btn" aria-label="Continue with Google">
        <span class="google-logo" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.79 2.72v2.26h2.9c1.7-1.56 2.69-3.86 2.69-6.62z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.35-1.59-5.06-3.72H.94v2.33A9 9 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.94 10.7a5.41 5.41 0 0 1 0-3.4V4.97H.94a9 9 0 0 0 0 8.06l3-2.33z" fill="#FBBC05"/>
            <path d="M9 3.58c1.32 0 2.5.46 3.44 1.34l2.58-2.58A8.96 8.96 0 0 0 9 0a9 9 0 0 0-8.06 4.97l3 2.33C4.65 5.17 6.65 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
        </span>
        <span class="google-login-text">Continue with Google</span>
      </button>

      <a href="./CreateProfilePage.html" class="secondary quick-start-link">
        Quick Start - Create Profile
      </a>

      <p class="signup-text">
        Don’t have an account?
        <a href="SignUpPage.html" class="signup-link">Sign Up</a>
      </p>
    </div>
    <!-- Footer -->
    <p style="color: white; margin-top: 16px; font-size: 14px;">
      © 2026 LabelWise. Making food safety simple.
    </p>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/profileStorage.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
