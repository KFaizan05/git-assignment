<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/logs.css">
</head>
<body class="login-page">
  <div class="container">
    <img src="images/LabelWise.png" class="logo">
    <div class="card">
      <h2>Welcome Back!</h2>

      <form id="loginForm" novalidate>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter your email" autocomplete="username">

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">

        <p id="loginError" class="login-error" role="alert" hidden></p>

        <a href="#" class="forgot">Forgot password?</a>

        <button type="submit" class="primary-btn">Login</button>
      </form>

      <div class="divider"><span>or</span></div>

      <a href="./CreateProfilePage.html" class="secondary quick-start-link">
        Quick Start - Create Profile
      </a>

      <p class="signup-text">
        Don’t have an account?
        <a href="SignUpPage.html" class="signup-link">Sign Up</a>
      </p>
    </div>
    <!-- Footer -->
    <p style="color: white; margin-top: 16px; font-size: 14px;">
      © 2026 LabelWise. Making food safety simple.
    </p>
  </div>

  <script src="../js/profileStorage.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
