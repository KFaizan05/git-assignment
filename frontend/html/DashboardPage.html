<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
  <main class="dashboard-page">
    <section class="dashboard-shell">

      <header class="dashboard-header">
        <div class="header-row">
          <img src="./images/LabelWiseIcon.png" class="header-logo" alt="Logo"/>

          <div class="header-text">
            <h1 id="welcomeTitle">Welcome back!</h1>
            <p>Let's find safe food for you</p>
          </div>

          <button id="settingsBtn" class="setting-btn" type="button" aria-label="Settings">
            <img src="./images/SettingIcon.png" alt="Setting" class="setting-icon">
          </button>
        </div>
      </header>

      <section class="dashboard-content">

        <section class="section-block">
          <h2>Quick Actions</h2>

          <div class="quick-actions">
            <a href="ScanPage.html" class="quick-card primary-action-card">
              <div class="quick-icon">
                <img src="./images/ScanIcon.png" class="quick-icon" alt="Scan"/>
              </div>
              <span>Scan Product</span>
            </a>

            <a href="AIChatbotPage.html" class="quick-card secondary-action-card">
              <div class="quick-icon">
                <img src="./images/BigGChatIcon.png" class="quick-icon" alt="AI Chef"/>
              </div>
              <span>AI Chef</span>
            </a>
          </div>
        </section>

        <section class="section-block">
          <div class="section-header">
            <h2>Your Dietary Profile</h2>
            <button class="text-link" id="editProfileBtn" type="button">Edit</button>
          </div>

          <div id="dietaryProfileContainer" class="profile-card"></div>
        </section>

        <section class="section-block">
          <div class="section-header">
            <h2>Recent Scans</h2>
            <a class="text-link" href="ScanHistoryPage.html">View All</a>
          </div>

          <div id="recentScansContainer" class="scan-list"></div>
        </section>

        <a href="SafeItemsPage.html" class="safe-items-card">
          <div class="safe-items-left">
            <div class="safe-items-icon">✓</div>
            <div>
              <h3>My Safe Items</h3>
              <p>View all approved products</p>
            </div>
          </div>
        </a>

      </section>

      <nav class="bottom-nav">
        <a href="DashboardPage.html" class="nav-item active">
          <div class="nav-icon">
            <img src="./images/HomeIcon.png" class="nav-icon" alt="Home"/>
          </div>
          <span>Home</span>
        </a>

        <a href="ScanPage.html" class="nav-item nav-scan">
          <div class="scan-fab">
            <img src="./images/SmallScanIcon.png" class="nav-icon" alt="Scan"/>
          </div>
          <span>Scan</span>
        </a>

        <a href="AIChatbotPage.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/ChatIcon.png" class="nav-icon" alt="AI Chef"/>
          </div>
          <span>AI Chef</span>
        </a>

        <a href="ScanHistoryPage.html" class="nav-item">
          <div class="nav-icon">
            <img src="./images/RecentIcon.png" class="nav-icon" alt="History"/>
          </div>
          <span>History</span>
        </a>
      </nav>

    </section>
  </main>

  <script src="../js/i18n.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/profileStorage.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
